# Trip Ingestion Data Engineering Pipeline
# Stack: Airflow (local), FastAPI, PostgreSQL/PostGIS, dbt-core, Redis
# Redis is required for SSE ingestion status (no polling)

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: trips
      POSTGRES_PASSWORD: trips
      POSTGRES_DB: trips
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trips -d trips"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.8.0
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://trips:trips@postgres/trips
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      _PIP_ADDITIONAL_REQUIREMENTS: 'psycopg2-binary redis httpx dbt-core dbt-postgres'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./services:/opt/airflow/services
      - ./dataset:/opt/airflow/dataset
      - ./dbt:/opt/airflow/dbt
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.8.0
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://trips:trips@postgres/trips
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: trips
      POSTGRES_USER: trips
      POSTGRES_PASSWORD: trips
      REDIS_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      _PIP_ADDITIONAL_REQUIREMENTS: 'psycopg2-binary redis httpx dbt-core dbt-postgres'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./services:/opt/airflow/services
      - ./dataset:/opt/airflow/dataset
      - ./dbt:/opt/airflow/dbt
    command: airflow webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  airflow-scheduler:
    image: apache/airflow:2.8.0
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://trips:trips@postgres/trips
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: trips
      POSTGRES_USER: trips
      POSTGRES_PASSWORD: trips
      REDIS_URL: redis://redis:6379/0
      _PIP_ADDITIONAL_REQUIREMENTS: 'psycopg2-binary redis httpx dbt-core dbt-postgres'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./services:/opt/airflow/services
      - ./dataset:/opt/airflow/dataset
      - ./dbt:/opt/airflow/dbt
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://trips:trips@postgres:5432/trips
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AIRFLOW_API_URL: http://airflow-webserver:8080/api/v1
      AIRFLOW_USER: admin
      AIRFLOW_PASSWORD: admin
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
